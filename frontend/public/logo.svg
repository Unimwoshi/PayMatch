<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Gradient for stroke -->
    <linearGradient id="gradRed" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5a0f0f"/>
      <stop offset="100%" stop-color="#b31212"/>
    </linearGradient>

    <!-- Subtle glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rings -->
  <circle cx="200" cy="200" r="110" stroke="#7a1a1a" stroke-width="2" fill="none" opacity="0.25"/>
  <circle cx="200" cy="200" r="140" stroke="#7a1a1a" stroke-width="2" fill="none" opacity="0.18"/>
  <circle cx="200" cy="200" r="170" stroke="#7a1a1a" stroke-width="2" fill="none" opacity="0.12"/>

  <!-- Upward stock line -->
  <polyline 
    points="90,260 140,220 185,235 235,180 285,150" 
    fill="none" 
    stroke="url(#gradRed)" 
    stroke-width="5" 
    stroke-linecap="round" 
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Proper arrowhead aligned with line -->
  <polygon 
    points="285,150 272,152 280,138" 
    fill="#b31212"
    transform="rotate(-20 285 150)"
  />

  <!-- AE text -->
  <text x="200" y="215" 
        text-anchor="middle" 
        font-family="Poppins, sans-serif" 
        font-size="72" 
        font-weight="600" 
        fill="#8B0000"
        letter-spacing="2">
    AE
  </text>

</svg>